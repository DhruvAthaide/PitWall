services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - fantasydrs-db:/app
      - fantasydrs-cache:/app/.fastf1_cache
    restart: unless-stopped
    networks:
      - fantasydrs

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fantasydrs

volumes:
  fantasydrs-db:
  fantasydrs-cache:

networks:
  fantasydrs:
    driver: bridge
